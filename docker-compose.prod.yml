# Production overrides. Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Requires .env in the repo root (copy from .env.production.example) with at
# least DOMAIN and CERTBOT_EMAIL set. Run
# infrastructure/certbot/init-letsencrypt.sh once before the first start to
# obtain a real TLS certificate (see DEPLOYMENT.md).

services:
  nginx:
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      sh -c 'trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h;
      done'
    networks:
      - solid-video-verification

  frontend:
    restart: always
    build:
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN}
        NEXT_PUBLIC_SESSION_COOKIE: ${SESSION_COOKIE_NAME:-solid_video_verification_session}

  backend:
    restart: always
    environment:
      # Derived from the same DOMAIN as everything else so it can't drift
      # out of sync with the nginx server_name / Let's Encrypt cert below.
      AGORA_RECORDING_STORAGE_ENDPOINT: storage.${DOMAIN}

  db:
    restart: always

  redis:
    restart: always

  minio:
    restart: always

  minio-init:
    restart: "no"

volumes:
  certbot_conf:
  certbot_www:

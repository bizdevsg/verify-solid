# Production overrides. Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Requires .env in the repo root (copy from .env.production.example) with at
# least DOMAIN and CERTBOT_EMAIL set. Run
# infrastructure/certbot/init-letsencrypt.sh once before the first start to
# obtain a real TLS certificate (see DEPLOYMENT.md).

services:
  nginx:
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      sh -c 'trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h;
      done'
    networks:
      - solid-video-verification

  frontend:
    restart: always
    build:
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN}
        NEXT_PUBLIC_SESSION_COOKIE: ${SESSION_COOKIE_NAME:-solid_video_verification_session}

  backend:
    restart: always
    environment:
      LIVEKIT_URL: wss://livekit.${DOMAIN}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}

  db:
    restart: always

  redis:
    restart: always

  livekit:
    restart: always
    ports:
      # TURN/TLS — a fallback path for clients whose network blocks/throttles
      # the direct UDP media above, tunneling over TLS instead (see the
      # `turn:` section in livekit.prod.yaml.template for why).
      - "5349:5349"
    volumes:
      - ./infrastructure/livekit/livekit.prod.yaml:/etc/livekit.yaml:ro
      # Read-only access to the same cert Certbot issues for livekit.${DOMAIN}
      # (already mounted read-write into the certbot service, read-only here
      # since LiveKit only ever reads it).
      - certbot_conf:/etc/letsencrypt:ro

  minio:
    restart: always

  minio-init:
    restart: "no"

  livekit-egress:
    restart: always
    volumes:
      - ./infrastructure/livekit/egress.prod.yaml:/etc/egress.yaml:ro

volumes:
  certbot_conf:
  certbot_www:

upstream frontend_upstream {
    server frontend:3000;
}

upstream backend_upstream {
    server backend:9000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # Laravel API + Sanctum CSRF cookie route.
    # All requests here are handled by the front controller (no static
    # files live under /api or /sanctum), so we fastcgi_pass directly
    # instead of using try_files against the backend container's disk.
    location ~ ^/(api|sanctum) {
        fastcgi_pass backend_upstream;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
    }

    # Everything else goes to the Next.js frontend
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

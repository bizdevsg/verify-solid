services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - solid-video-verification

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost
        NEXT_PUBLIC_SESSION_COOKIE: solid_video_verification_session
    depends_on:
      - backend
    networks:
      - solid-video-verification

  backend:
    build:
      context: ./backend
    volumes:
      - backend_storage:/var/www/backend/storage/app
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      DB_DATABASE: ${DB_DATABASE:-solid_video_verification}
      DB_USERNAME: ${DB_USERNAME:-solid}
      DB_PASSWORD: ${DB_PASSWORD:-solid_secret}
      REDIS_HOST: redis
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: recordings
      MINIO_REGION: us-east-1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - solid-video-verification

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-solid_video_verification}
      MYSQL_USER: ${DB_USERNAME:-solid}
      MYSQL_PASSWORD: ${DB_PASSWORD:-solid_secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - solid-video-verification

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - solid-video-verification

  # Recording storage for Agora Cloud Recording. Call recordings must not
  # live in MySQL or behind a public URL (see backend/config/filesystems.php
  # "recordings" disk) — MinIO gives us an S3-compatible bucket the backend
  # streams from through its own authenticated download endpoint.
  #
  # No host port mapping here (same as db/redis) — in production, nginx is
  # what actually exposes this to the internet, over its own subdomain +
  # TLS, since Agora's Cloud Recording runs on Agora's own servers and needs
  # to reach this bucket over the real internet to upload a finished
  # recording (see docker-compose.prod.yml and DEPLOYMENT.md). In local dev,
  # nothing outside this compose network can reach it, which also means
  # Agora's recording can't be tested end-to-end without either deploying
  # for real or tunnelling this port out (e.g. ngrok) — the video call
  # itself works fine locally regardless, since that's a direct
  # browser-to-Agora connection with no dependency on this container.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - solid-video-verification

  # One-shot: creates the "recordings" bucket if it doesn't exist yet, then
  # exits. MinIO never auto-creates buckets on its own.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin_secret} &&
      mc mb -p local/recordings
      "
    networks:
      - solid-video-verification

networks:
  solid-video-verification:
    driver: bridge

volumes:
  db_data:
  backend_storage:
  minio_data:
